name: Release

on:
  push:
    branches: [main]
    tags-ignore: ["**"]
  workflow_dispatch:
    inputs:
      force:
        description: "Create a release even if no commit is normally release-eligible"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[bot]')
    permissions:
      contents: write

    steps:
      - name: Checkout repository (full history required for tag/commit analysis)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity for commits made by this job
        run: |
          git config user.name  "spideyofficial777"
          git config user.email "173601904+spideyofficial777@users.noreply.github.com"

      - name: Read current version from configs.py
        id: current
        run: bash .github/scripts/read-configs-version.sh

      - name: Resolve previous release tag
        id: latest
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
        run: |
          git fetch --tags --quiet
          CANDIDATE="v${CURRENT_VERSION}"
          if git rev-parse "$CANDIDATE" >/dev/null 2>&1; then
            TAG="$CANDIDATE"
          else
            TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Comparing against: ${TAG:-<repo start>}"

      - name: Analyze commits since last release
        id: analyze
        env:
          PREV_TAG: ${{ steps.latest.outputs.tag }}
          NOTES_DIR: /tmp/release-notes
        run: bash .github/scripts/analyze-commits.sh

      - name: Decide whether a release is warranted
        id: gate
        env:
          BUMP: ${{ steps.analyze.outputs.bump }}
          COMMIT_COUNT: ${{ steps.analyze.outputs.commit_count }}
          RELEASE_ELIGIBLE: ${{ steps.analyze.outputs.release_eligible }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "Manual force-release requested."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          elif [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No commits since the last release — nothing to do."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "heartbeat=false" >> "$GITHUB_OUTPUT"
          elif [ "$RELEASE_ELIGIBLE" != "true" ]; then
            echo "No release required because no user-facing changes were detected."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "heartbeat=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Heartbeat-only README refresh (no release)
        if: steps.gate.outputs.proceed == 'false' && steps.gate.outputs.heartbeat == 'true'
        run: |
          README="README.md"
          if ! grep -q "<!-- LAST_UPDATED -->" "$README"; then
            echo "No metadata anchors found — nothing to refresh."
            exit 0
          fi
          LAST_UPDATED=$(date -u +"%B %d, %Y")
          sed -E "s|<!-- LAST_UPDATED -->.*<!-- END_LAST_UPDATED -->|<!-- LAST_UPDATED -->${LAST_UPDATED}<!-- END_LAST_UPDATED -->|g" \
            "$README" > "${README}.tmp" && mv "${README}.tmp" "$README"
          if ! git diff --quiet "$README"; then
            git add README.md
            git commit -m "docs: refresh README timestamp [skip ci]"
            git push origin HEAD:main
          else
            echo "README already current — nothing to commit."
          fi

      - name: Compute next version
        id: version
        if: steps.gate.outputs.proceed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
          BUMP: ${{ steps.analyze.outputs.bump }}
        run: |
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
          case "${BUMP/none/patch}" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            *)     NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEW_VERSION"

      - name: Check the tag/release doesn't already exist
        id: dup
        if: steps.gate.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists locally/remotely — skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif gh release view "$NEW_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $NEW_TAG already exists — skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render release notes
        if: steps.gate.outputs.proceed == 'true' && steps.dup.outputs.exists == 'false'
        env:
          NOTES_DIR: /tmp/release-notes
          OUTPUT_FILE: /tmp/release-body.md
        run: bash .github/scripts/render-notes.sh

      - name: Build release title
        id: title
        if: steps.gate.outputs.proceed == 'true' && steps.dup.outputs.exists == 'false'
        env:
          BUMP: ${{ steps.analyze.outputs.bump }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          HAS_FEATURES=$([ -s /tmp/release-notes/features.md ] && echo true || echo false)
          HAS_FIXES=$([ -s /tmp/release-notes/fixes.md ] && echo true || echo false)
          HAS_PERF=$([ -s /tmp/release-notes/performance.md ] && echo true || echo false)

          case "$BUMP" in
            major)
              SUBTITLE="Major Update"
              ;;
            minor)
              if [ "$HAS_FEATURES" = "true" ]; then SUBTITLE="New Features"; else SUBTITLE="Improvements"; fi
              ;;
            *)
              if [ "$HAS_FIXES" = "true" ] && [ "$HAS_PERF" = "true" ]; then
                SUBTITLE="Bug Fixes & Performance"
              elif [ "$HAS_FIXES" = "true" ]; then
                SUBTITLE="Bug Fixes"
              elif [ "$HAS_PERF" = "true" ]; then
                SUBTITLE="Performance Improvements"
              else
                SUBTITLE="Stability Improvements"
              fi
              ;;
          esac
          echo "title=${NEW_TAG} — ${SUBTITLE}" >> "$GITHUB_OUTPUT"

      - name: Update VERSION in configs.py
        if: steps.gate.outputs.proceed == 'true' && steps.dup.outputs.exists == 'false'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: bash .github/scripts/bump-configs-version.sh

      - name: Update CHANGELOG.md
        if: steps.gate.outputs.proceed == 'true' && steps.dup.outputs.exists == 'false'
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          ENTRY_FILE=$(mktemp)
          {
            echo "## [$NEW_TAG] - $DATE"
            echo
            cat /tmp/release-body.md
            echo
          } > "$ENTRY_FILE"

          if [ ! -f CHANGELOG.md ]; then
            printf "# Changelog\n\nAll notable changes to this project are documented here.\n\n" > CHANGELOG.md
          fi

          if grep -q '^## \[' CHANGELOG.md; then
            awk 'BEGIN{done=0} /^## \[/{ if(!done){while((getline line < "'"$ENTRY_FILE"'")>0) print line; done=1 } } {print}' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          else
            cat "$ENTRY_FILE" >> CHANGELOG.md
          fi
          rm -f "$ENTRY_FILE"

      - name: Refresh README metadata
        if: steps.gate.outputs.proceed == 'true' && steps.dup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          README="README.md"
          if ! grep -q "<!-- LAST_UPDATED -->" "$README"; then
            echo "No metadata anchors found in README.md — skipping."
            exit 0
          fi
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          LAST_UPDATED=$(date -u +"%B %d, %Y")
          STARS=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.stargazers_count' 2>/dev/null || echo "0")
          FORKS=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.forks_count' 2>/dev/null || echo "0")

          replace_anchor () {
            sed -E "s|<!-- $1 -->.*<!-- END_$1 -->|<!-- $1 -->$2<!-- END_$1 -->|g" \
              "$README" > "${README}.tmp" && mv "${README}.tmp" "$README"
          }
          replace_anchor "LAST_UPDATED" "$LAST_UPDATED"
          replace_anchor "LATEST_VERSION" "$NEW_TAG"
          replace_anchor "LAST_RELEASE_DATE" "$RELEASE_DATE"
          if grep -q "<!-- REPO_STARS -->" "$README"; then
            replace_anchor "REPO_STARS" "$STARS"
            replace_anchor "REPO_FORKS" "$FORKS"
          fi

      - name: Commit release changes
        if: steps.gate.outputs.proceed == 'true' && steps.dup.outputs.exists == 'false'
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          git add configs.py CHANGELOG.md README.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit for $NEW_TAG (version/changelog/readme all unchanged)."
          else
            git commit -m "chore(release): $NEW_TAG [skip ci]"
            git push origin HEAD:main
          fi

      - name: Push release tag
        if: steps.gate.outputs.proceed == 'true' && steps.dup.outputs.exists == 'false'
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          git tag -a "$NEW_TAG" -m "${{ steps.title.outputs.title }}"
          git push origin "$NEW_TAG"

      - name: Publish GitHub Release
        if: steps.gate.outputs.proceed == 'true' && steps.dup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          gh release create "$NEW_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.title.outputs.title }}" \
            --notes-file /tmp/release-body.md \
            --latest

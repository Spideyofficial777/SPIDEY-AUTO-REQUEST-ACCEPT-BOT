name: Monthly Maintenance

on:
  schedule:
    - cron: "0 0 1 * *" # 1st of every month, 00:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only — skip all commits, tags, and releases"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: monthly-maintenance
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  maintenance:
    name: Monthly Refresh & Release Check
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity for commits made by this job
        run: |
          git config user.name  "spideyofficial777"
          git config user.email "173601904+spideyofficial777@users.noreply.github.com"

      - name: Refresh README last-updated timestamp
        id: heartbeat
        if: github.event.inputs.dry_run != 'true'
        run: |
          README="README.md"
          if ! grep -q "<!-- LAST_UPDATED -->" "$README"; then
            echo "No metadata anchors found — skipping."
            exit 0
          fi
          LAST_UPDATED=$(date -u +"%B %d, %Y")
          sed -E "s|<!-- LAST_UPDATED -->.*<!-- END_LAST_UPDATED -->|<!-- LAST_UPDATED -->${LAST_UPDATED}<!-- END_LAST_UPDATED -->|g" \
            "$README" > "${README}.tmp" && mv "${README}.tmp" "$README"
          if ! git diff --quiet "$README"; then
            git add README.md
            git commit -m "docs: monthly README timestamp refresh [skip ci]"
            git push origin HEAD:main
          else
            echo "README already current — nothing to commit."
          fi

      - name: Read current version from configs.py
        id: current
        run: bash .github/scripts/read-configs-version.sh

      - name: Resolve previous release tag
        id: latest
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
        run: |
          git fetch --tags --quiet
          CANDIDATE="v${CURRENT_VERSION}"
          if git rev-parse "$CANDIDATE" >/dev/null 2>&1; then
            TAG="$CANDIDATE"
          else
            TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Analyze commits since last release
        id: analyze
        env:
          PREV_TAG: ${{ steps.latest.outputs.tag }}
          NOTES_DIR: /tmp/release-notes
        run: bash .github/scripts/analyze-commits.sh

      - name: Decide whether a release is warranted
        id: gate
        env:
          COMMIT_COUNT: ${{ steps.analyze.outputs.commit_count }}
          RELEASE_ELIGIBLE: ${{ steps.analyze.outputs.release_eligible }}
        run: |
          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No commits since the last release — nothing to do this month."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          elif [ "$RELEASE_ELIGIBLE" != "true" ]; then
            echo "No release required because no user-facing changes were detected."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: version
        if: steps.gate.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
          BUMP: ${{ steps.analyze.outputs.bump }}
        run: |
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            *)     NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Confirm tag/release does not already exist
        id: dup
        if: steps.version.outputs.new_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1 || gh release view "$NEW_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render release notes
        if: steps.dup.outputs.exists == 'false'
        env:
          NOTES_DIR: /tmp/release-notes
          OUTPUT_FILE: /tmp/release-body.md
        run: bash .github/scripts/render-notes.sh

      - name: Build release title
        id: title
        if: steps.dup.outputs.exists == 'false'
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          MONTH=$(date -u +"%B %Y")
          echo "title=${NEW_TAG} — ${MONTH} Update" >> "$GITHUB_OUTPUT"

      - name: Update VERSION in configs.py
        if: steps.dup.outputs.exists == 'false'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: bash .github/scripts/bump-configs-version.sh

      - name: Update CHANGELOG.md
        if: steps.dup.outputs.exists == 'false'
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          ENTRY_FILE=$(mktemp)
          { echo "## [$NEW_TAG] - $DATE"; echo; cat /tmp/release-body.md; echo; } > "$ENTRY_FILE"
          [ -f CHANGELOG.md ] || printf "# Changelog\n\nAll notable changes to this project are documented here.\n\n" > CHANGELOG.md
          if grep -q '^## \[' CHANGELOG.md; then
            awk 'BEGIN{done=0} /^## \[/{ if(!done){while((getline line < "'"$ENTRY_FILE"'")>0) print line; done=1 } } {print}' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
          else
            cat "$ENTRY_FILE" >> CHANGELOG.md
          fi
          rm -f "$ENTRY_FILE"

      - name: Refresh README metadata for this release
        if: steps.dup.outputs.exists == 'false'
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          README="README.md"
          if ! grep -q "<!-- LAST_UPDATED -->" "$README"; then
            exit 0
          fi
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          replace_anchor () {
            sed -E "s|<!-- $1 -->.*<!-- END_$1 -->|<!-- $1 -->$2<!-- END_$1 -->|g" \
              "$README" > "${README}.tmp" && mv "${README}.tmp" "$README"
          }
          replace_anchor "LATEST_VERSION" "$NEW_TAG"
          replace_anchor "LAST_RELEASE_DATE" "$RELEASE_DATE"

      - name: Commit release changes
        if: steps.dup.outputs.exists == 'false'
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          git add configs.py CHANGELOG.md README.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit for $NEW_TAG."
          else
            git commit -m "chore(release): $NEW_TAG [skip ci]"
            git push origin HEAD:main
          fi

      - name: Push release tag
        if: steps.dup.outputs.exists == 'false'
        env:
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          git tag -a "$NEW_TAG" -m "${{ steps.title.outputs.title }}"
          git push origin "$NEW_TAG"

      - name: Publish GitHub Release
        if: steps.dup.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
        run: |
          gh release create "$NEW_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ steps.title.outputs.title }}" \
            --notes-file /tmp/release-body.md \
            --latest

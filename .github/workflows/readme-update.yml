
name: README Maintenance (Manual)

on:
  workflow_dispatch: {}

concurrency:
  group: readme-maintenance
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-readme:
    name: Refresh README Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity for commits made by this job
        run: |
          git config user.name  "spideyofficial777"
          git config user.email "41898282+spideyofficial777@users.noreply.github.com"

      # -----------------------------------------------------------------------
      # Gather the values that go into the metadata block.
      # -----------------------------------------------------------------------
      - name: Gather repository metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)
          LATEST_TAG=${LATEST_TAG:-"unreleased"}

          if [ "$LATEST_TAG" != "unreleased" ]; then
            RELEASE_DATE=$(git log -1 --format=%ad --date=short "$LATEST_TAG" 2>/dev/null || date -u +"%Y-%m-%d")
          else
            RELEASE_DATE="n/a"
          fi

          LAST_UPDATED=$(date -u +"%B %d, %Y")

          STARS=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.stargazers_count' 2>/dev/null || echo "0")
          FORKS=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.forks_count' 2>/dev/null || echo "0")
          OPEN_ISSUES=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.open_issues_count' 2>/dev/null || echo "0")

          echo "latest_version=$LATEST_TAG"     >> "$GITHUB_OUTPUT"
          echo "release_date=$RELEASE_DATE"     >> "$GITHUB_OUTPUT"
          echo "last_updated=$LAST_UPDATED"     >> "$GITHUB_OUTPUT"
          echo "stars=$STARS"                   >> "$GITHUB_OUTPUT"
          echo "forks=$FORKS"                   >> "$GITHUB_OUTPUT"
          echo "open_issues=$OPEN_ISSUES"       >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Replace only the content between the HTML comment anchors below.
      # If the anchors are missing (e.g. someone reformatted the README),
      # nothing is force-inserted — the workflow just reports that and stops,
      # rather than guessing where to put a table.
      # -----------------------------------------------------------------------
      - name: Update metadata block
        id: update
        env:
          LATEST_VERSION: ${{ steps.meta.outputs.latest_version }}
          RELEASE_DATE:   ${{ steps.meta.outputs.release_date }}
          LAST_UPDATED:   ${{ steps.meta.outputs.last_updated }}
          STARS:          ${{ steps.meta.outputs.stars }}
          FORKS:          ${{ steps.meta.outputs.forks }}
          OPEN_ISSUES:    ${{ steps.meta.outputs.open_issues }}
        run: |
          README="README.md"

          if ! grep -q "<!-- LAST_UPDATED -->" "$README"; then
            echo "No metadata anchors found in README.md — skipping (nothing modified)."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          replace_anchor () {
            local key="$1" value="$2"
            sed -E "s|<!-- ${key} -->.*<!-- END_${key} -->|<!-- ${key} -->${value}<!-- END_${key} -->|g" \
              "$README" > "${README}.tmp" && mv "${README}.tmp" "$README"
          }

          replace_anchor "LAST_UPDATED"       "$LAST_UPDATED"
          replace_anchor "LATEST_VERSION"     "$LATEST_VERSION"
          replace_anchor "LAST_RELEASE_DATE"  "$RELEASE_DATE"

          if grep -q "<!-- REPO_STARS -->" "$README"; then
            replace_anchor "REPO_STARS" "$STARS"
            replace_anchor "REPO_FORKS" "$FORKS"
            replace_anchor "REPO_OPEN_ISSUES" "$OPEN_ISSUES"
          fi

          if git diff --quiet "$README"; then
            echo "README already up to date — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit README (only if it actually changed)
        if: steps.update.outputs.changed == 'true'
        env:
          LATEST_VERSION: ${{ steps.meta.outputs.latest_version }}
        run: |
          git add README.md
          git commit -m "docs: refresh README metadata for ${LATEST_VERSION} [skip ci]"
          git push origin HEAD:main
